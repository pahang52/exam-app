name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: kivy/buildozer:latest

    steps:
      - uses: actions/checkout@v4

      - name: Build APK
        env:
          BUILDOZER_ALLOW_ROOT: "1"
          PIP_BREAK_SYSTEM_PACKAGES: "1"
        run: |
          yes | buildozer android debug

      - uses: actions/upload-artifact@v4
        with:
          name: APK
          path: bin/*.apk
